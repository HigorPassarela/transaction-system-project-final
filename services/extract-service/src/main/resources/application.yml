server:
  port: 8082

spring:
  application:
    name: extract-service
  
  data:
    mongodb:
      uri: mongodb://localhost:27017/transaction_system

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    br.com.agibank: DEBUG
