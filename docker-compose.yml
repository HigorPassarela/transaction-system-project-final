services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: agibank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - agibank-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: agibank-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      # Adicionar configurações para melhor performance
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_SEGMENT_BYTES: 1073741824
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
    ports:
      - "9092:9092"
    networks:
      - agibank-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: agibank-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agibank-network

  # MongoDB - AJUSTAR PARA O EXTRACT SERVICE
  mongodb:
    image: mongo:6
    container_name: agibank-mongodb
    environment:
      # Remover autenticação para simplicidade no desenvolvimento
      MONGO_INITDB_DATABASE: agibank_extracts  # ← MUDANÇA AQUI
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init-scripts:/docker-entrypoint-initdb.d  # ← ADICIONAR ISSO
    networks:
      - agibank-network

  # Camunda
  camunda:
    image: camunda/camunda-bpm-platform:7.20.0
    container_name: agibank-camunda
    environment:
      DB_DRIVER: org.h2.Driver
      DB_URL: jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      DB_USERNAME: sa
      DB_PASSWORD: sa
      # Adicionar configurações JVM
      JAVA_OPTS: "-Xmx512m -XX:MaxMetaspaceSize=256m"
    ports:
      - "8080:8080"
    networks:
      - agibank-network

  # ADICIONAR KAFKA UI PARA MONITORAMENTO
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: agibank-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: agibank-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8090:8080"  # ← MUDANÇA DE PORTA (Camunda já usa 8080)
    networks:
      - agibank-network

volumes:
  mongodb_data:
  redis_data:

networks:
  agibank-network:
    driver: bridge