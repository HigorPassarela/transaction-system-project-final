services:
  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: agibank-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - agibank-network

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: agibank-kafka
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    ports:
      - "9092:9092"
    networks:
      - agibank-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: agibank-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - agibank-network

  # MongoDB
  mongodb:
    image: mongo:6
    container_name: agibank-mongodb
    environment:
      MONGO_INITDB_DATABASE: transaction_system
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - agibank-network

  # Camunda
  camunda:
    image: camunda/camunda-bpm-platform:7.20.0
    container_name: agibank-camunda
    environment:
      DB_DRIVER: org.h2.Driver
      DB_URL: jdbc:h2:mem:camunda;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
      DB_USERNAME: sa
      DB_PASSWORD: sa
    ports:
      - "8080:8080"
    networks:
      - agibank-network

volumes:
  mongodb_data:
  redis_data:

networks:
  agibank-network:
    driver: bridge
